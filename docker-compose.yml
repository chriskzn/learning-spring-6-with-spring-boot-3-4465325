version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: lil_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: local
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
      # Initialize DB from chapter SQL (runs only on first container start)
      - ./05_04_end/bin/postgresql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./05_04_end/bin/postgresql/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    ports:
      - "5432:5432"

  adminer:
    image: adminer:latest
    container_name: lil_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - postgres

  landon-hotel:
    build:
      context: ./05_04_end/landon-hotel
      dockerfile: Dockerfile
    image: landon-hotel:05_04
    container_name: lil_landon_hotel
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/local?currentSchema=LIL
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    depends_on:
      - postgres

volumes:
  postgres_data:
    name: lil_postgres_data
